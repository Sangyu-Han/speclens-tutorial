name: linear
description: "blocks.0 -> ... -> blocks.11 -> imagenet_logits"

head_layer: "imagenet_logits"
head_module: "model.head"

ordered_layers:
  - "blocks.0"
  - "blocks.1"
  - "blocks.2"
  - "blocks.3"
  - "blocks.4"
  - "blocks.5"
  - "blocks.6"
  - "blocks.7"
  - "blocks.8"
  - "blocks.9"
  - "blocks.10"
  - "blocks.11"
  - "imagenet_logits"

modules:
