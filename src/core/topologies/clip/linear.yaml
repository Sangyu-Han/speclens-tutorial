  "blocks.2": "model.blocks.2::sae_layer#latent"
  "blocks.3": "model.blocks.3::sae_layer#latent"
  "blocks.4": "model.blocks.4::sae_layer#latent"
  "blocks.5": "model.blocks.5::sae_layer#latent"
  "blocks.6": "model.blocks.6::sae_layer#latent"
  "blocks.7": "model.blocks.7::sae_layer#latent"
  "blocks.8": "model.blocks.8::sae_layer#latent"
  "blocks.9": "model.blocks.9::sae_layer#latent"
  "blocks.10": "model.blocks.10::sae_layer#latent"
  "blocks.11": "model.blocks.11::sae_layer#latent"
  "imagenet_logits": "model.head"

defaults:
  forward_backend: "input_x_grad"
  forward_ig_active: []
  backward_backend: "input_x_grad"
